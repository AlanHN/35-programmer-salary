<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>35岁程序员工资计算器</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    header p {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 25px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }

    .card h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
    }

    .input-group label {
      font-weight: 600;
      color: #555;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    .input-group input {
      padding: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 1rem;
      transition: all 0.3s ease;
      background: #f8f9fa;
    }

    .input-group input:focus {
      outline: none;
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .input-group .hint {
      font-size: 0.85rem;
      color: #888;
      margin-top: 5px;
    }

    .preset-buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .preset-btn {
      padding: 10px 20px;
      border: 2px solid #667eea;
      background: white;
      color: #667eea;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 500;
    }

    .preset-btn:hover, .preset-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-color: transparent;
    }

    .btn-group {
      display: flex;
      gap: 15px;
      margin-top: 25px;
      flex-wrap: wrap;
    }

    button {
      padding: 14px 30px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #666;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      transition: transform 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-5px);
    }

    .stat-card .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #667eea;
      margin-bottom: 5px;
    }

    .stat-card .stat-label {
      color: #666;
      font-size: 0.9rem;
    }

    .stat-card.secondary {
      background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
    }

    .stat-card.secondary .stat-value {
      color: #1976d2;
    }

    .stat-card.highlight {
      background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
    }

    .stat-card.highlight .stat-value {
      color: #e65100;
    }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 25px;
      margin-top: 25px;
    }

    .chart-card {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 15px;
    }

    .chart-card h4 {
      color: #555;
      margin-bottom: 15px;
      font-size: 1.1rem;
    }

    .chart-container {
      position: relative;
      height: 350px;
    }

    .comparison-section {
      margin-top: 30px;
    }

    .scenario-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .scenario-tab {
      padding: 10px 20px;
      background: #f0f0f0;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.9rem;
    }

    .scenario-tab.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .scenario-tab:hover {
      background: #e0e0e0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid #e0e0e0;
    }

    th {
      background: #f8f9fa;
      font-weight: 600;
      color: #555;
    }

    tr:hover {
      background: #f8f9fa;
    }

    .error-message {
      background: #fee;
      color: #c33;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .history-section {
      margin-top: 30px;
    }

    .history-list {
      margin-top: 15px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      background: #f8f9fa;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .history-info {
      color: #666;
      font-size: 0.9rem;
    }

    .history-actions {
      display: flex;
      gap: 8px;
    }

    .history-btn {
      padding: 6px 12px;
      font-size: 0.85rem;
      border-radius: 6px;
      cursor: pointer;
      border: none;
      background: #e0e0e0;
    }

    .history-btn:hover {
      background: #d0d0d0;
    }

    .history-btn.load {
      background: #667eea;
      color: white;
    }

    .history-btn.delete {
      background: #ff5252;
      color: white;
    }

    .toggle-section {
      display: flex;
      gap: 15px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .toggle-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-item label {
      color: #555;
      font-size: 0.95rem;
    }

    .toggle-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 1.8rem;
      }

      .card {
        padding: 20px;
      }

      .btn-group {
        flex-direction: column;
      }

      button {
        width: 100%;
        justify-content: center;
      }

      .charts-grid {
        grid-template-columns: 1fr;
      }

      .chart-container {
        height: 300px;
      }

      table {
        font-size: 0.85rem;
      }

      th, td {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>💰 35岁程序员工资计算器</h1>
      <p>规划你的财务未来，从今天开始</p>
    </header>

    <div class="card">
      <h2>🎯 基本信息</h2>
      <div class="error-message" id="errorMessage"></div>
      
      <div class="preset-buttons">
        <button class="preset-btn" onclick="applyPreset('conservative')">📉 保守型</button>
        <button class="preset-btn" onclick="applyPreset('balanced')">⚖️ 平衡型</button>
        <button class="preset-btn" onclick="applyPreset('aggressive')">📈 激进型</button>
      </div>

      <div class="input-grid" style="margin-top: 20px;">
        <div class="input-group">
          <label for="currentAge">当前年龄（岁）</label>
          <input type="number" id="currentAge" min="18" max="35" value="28">
          <span class="hint">范围：18-35岁</span>
        </div>
        <div class="input-group">
          <label for="currentSalary">现有年薪（万元）</label>
          <input type="number" id="currentSalary" min="0" value="30" step="0.1">
          <span class="hint">例如：30 = 30万年薪</span>
        </div>
        <div class="input-group">
          <label for="growthRate">年薪资增长率（%）</label>
          <input type="number" id="growthRate" min="0" max="100" value="10">
          <span class="hint">建议范围：5%-15%</span>
        </div>
        <div class="input-group">
          <label for="saveRate">年存款比例（%）</label>
          <input type="number" id="saveRate" min="0" max="100" value="40">
          <span class="hint">你每年存下收入的比例</span>
        </div>
        <div class="input-group">
          <label for="investmentRate">投资年化收益率（%）</label>
          <input type="number" id="investmentRate" min="0" max="50" value="6">
          <span class="hint">建议范围：4%-10%</span>
        </div>
        <div class="input-group">
          <label for="inflationRate">通货膨胀率（%）</label>
          <input type="number" id="inflationRate" min="0" max="20" value="3">
          <span class="hint">建议范围：2%-4%</span>
        </div>
      </div>

      <div class="toggle-section">
        <div class="toggle-item">
          <input type="checkbox" id="enableInflation" checked>
          <label for="enableInflation">📊 启用通货膨胀调整</label>
        </div>
        <div class="toggle-item">
          <input type="checkbox" id="enableInvestment" checked>
          <label for="enableInvestment">💹 启用投资收益计算</label>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn-primary" onclick="calculateAndShow()">
          <span>🚀</span> 开始计算
        </button>
        <button class="btn-secondary" onclick="addScenario()">
          <span>📈</span> 添加对比场景
        </button>
        <button class="btn-secondary" onclick="exportData()">
          <span>📥</span> 导出数据
        </button>
        <button class="btn-secondary" onclick="saveToHistory()">
          <span>💾</span> 保存到历史
        </button>
        <button class="btn-secondary" onclick="resetForm()">
          <span>🔄</span> 重置
        </button>
      </div>
    </div>

    <div class="card" id="resultsCard" style="display: none;">
      <h2>💡 计算结果</h2>
      <div class="results-grid">
        <div class="stat-card">
          <div class="stat-value" id="totalSavings">0</div>
          <div class="stat-label">35岁总存款（万元）</div>
        </div>
        <div class="stat-card secondary">
          <div class="stat-value" id="realTotalSavings">0</div>
          <div class="stat-label">35岁总存款实际价值（万元）</div>
        </div>
        <div class="stat-card highlight">
          <div class="stat-value" id="investmentIncome">0</div>
          <div class="stat-label">投资收益总额（万元）</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="avgSalary">0</div>
          <div class="stat-label">平均年薪（万元）</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="avgSavings">0</div>
          <div class="stat-label">平均年存款（万元）</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="workYears">0</div>
          <div class="stat-label">剩余工作年限</div>
        </div>
      </div>

      <div class="charts-grid">
        <div class="chart-card">
          <h4>📊 薪资与存款增长趋势</h4>
          <div class="chart-container">
            <canvas id="salaryChart"></canvas>
          </div>
        </div>
        <div class="chart-card">
          <h4>🥧 各年度存款占比</h4>
          <div class="chart-container">
            <canvas id="pieChart"></canvas>
          </div>
        </div>
        <div class="chart-card">
          <h4>📊 场景总存款对比</h4>
          <div class="chart-container">
            <canvas id="barChart"></canvas>
          </div>
        </div>
        <div class="chart-card">
          <h4>📈 存款与投资收益累计</h4>
          <div class="chart-container">
            <canvas id="areaChart"></canvas>
          </div>
        </div>
      </div>

      <div class="comparison-section">
        <div class="scenario-tabs" id="scenarioTabs"></div>
        <div id="scenarioContent"></div>
      </div>
    </div>

    <div class="card" id="historyCard" style="display: none;">
      <h2>📜 历史记录</h2>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <script>
    let salaryChart = null;
    let pieChart = null;
    let barChart = null;
    let areaChart = null;
    let scenarios = [];

    const presets = {
      conservative: {
        growthRate: 5,
        saveRate: 50,
        investmentRate: 4,
        inflationRate: 3
      },
      balanced: {
        growthRate: 10,
        saveRate: 40,
        investmentRate: 6,
        inflationRate: 3
      },
      aggressive: {
        growthRate: 15,
        saveRate: 30,
        investmentRate: 10,
        inflationRate: 3
      }
    };

    function showError(message) {
      const errorEl = document.getElementById('errorMessage');
      errorEl.textContent = message;
      errorEl.classList.add('show');
      setTimeout(() => errorEl.classList.remove('show'), 5000);
    }

    function calculateSavings(age, salary, growthRate, saveRate, investmentRate, inflationRate, enableInvestment, enableInflation) {
      if (age >= 35) {
        showError('年龄已经超过35岁，无需计算！');
        return null;
      }

      const data = [];
      let yearlySalary = salary;
      let totalSavings = 0;
      let totalInvestment = 0;
      let investmentPortfolio = 0;
      const inflationFactor = enableInflation ? (1 + inflationRate / 100) : 1;

      for (let i = age; i < 35; i++) {
        const yearlySavings = yearlySalary * (saveRate / 100);
        
        if (enableInvestment && i > age) {
          investmentPortfolio = investmentPortfolio * (1 + investmentRate / 100);
        }
        investmentPortfolio += yearlySavings;
        
        totalSavings += yearlySavings;
        totalInvestment = investmentPortfolio - totalSavings;
        
        const inflationMultiplier = Math.pow(inflationFactor, i - age + 1);

        data.push({
          age: i,
          salary: yearlySalary,
          realSalary: yearlySalary / inflationMultiplier,
          savings: yearlySavings,
          realSavings: yearlySavings / inflationMultiplier,
          totalSavings: totalSavings,
          realTotalSavings: totalSavings / inflationMultiplier,
          investmentPortfolio: investmentPortfolio,
          realInvestmentPortfolio: investmentPortfolio / inflationMultiplier,
          investmentIncome: totalInvestment
        });
        yearlySalary += yearlySalary * (growthRate / 100);
      }

      return {
        data: data,
        totalSavings: totalSavings,
        realTotalSavings: totalSavings / Math.pow(inflationFactor, data.length),
        investmentIncome: totalInvestment,
        avgSalary: data.reduce((sum, d) => sum + d.salary, 0) / data.length,
        avgSavings: data.reduce((sum, d) => sum + d.savings, 0) / data.length,
        workYears: data.length
      };
    }

    function formatNumber(num) {
      return (Math.round(num) / 10000).toLocaleString('zh-CN', { maximumFractionDigits: 2 });
    }

    function formatWan(num) {
      return (num / 10000).toFixed(2);
    }

    function getChartColors(count) {
      const colors = [
        'rgba(102, 126, 234, 0.8)',
        'rgba(118, 75, 162, 0.8)',
        'rgba(72, 187, 120, 0.8)',
        'rgba(255, 159, 64, 0.8)',
        'rgba(255, 99, 132, 0.8)',
        'rgba(54, 162, 235, 0.8)',
        'rgba(153, 102, 255, 0.8)',
        'rgba(255, 205, 86, 0.8)'
      ];
      return colors.slice(0, count);
    }

    function renderCharts(data, allScenarios) {
      const ctx1 = document.getElementById('salaryChart').getContext('2d');
      if (salaryChart) salaryChart.destroy();
      
      const labels = data.map(d => `${d.age}岁`);
      salaryChart = new Chart(ctx1, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: '年薪（万元）',
              data: data.map(d => d.salary / 10000),
              borderColor: '#667eea',
              backgroundColor: 'rgba(102, 126, 234, 0.1)',
              fill: true,
              tension: 0.4
            },
            {
              label: '年存款（万元）',
              data: data.map(d => d.savings / 10000),
              borderColor: '#764ba2',
              backgroundColor: 'rgba(118, 75, 162, 0.1)',
              fill: true,
              tension: 0.4
            },
            {
              label: '投资组合（万元）',
              data: data.map(d => d.investmentPortfolio / 10000),
              borderColor: '#48bb78',
              backgroundColor: 'rgba(72, 187, 120, 0.1)',
              fill: true,
              tension: 0.4
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            tooltip: {
              callbacks: {
                label: function(context) {
                  return context.dataset.label + ': ' + context.raw.toFixed(2) + ' 万';
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                callback: function(value) {
                  return value.toFixed(0) + '万';
                }
              }
            }
          }
        }
      });

      const ctx2 = document.getElementById('pieChart').getContext('2d');
      if (pieChart) pieChart.destroy();
      pieChart = new Chart(ctx2, {
        type: 'doughnut',
        data: {
          labels: data.map(d => `${d.age}岁`),
          datasets: [{
            data: data.map(d => d.savings / 10000),
            backgroundColor: getChartColors(data.length),
            borderWidth: 2,
            borderColor: '#fff'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            tooltip: {
              callbacks: {
                label: function(context) {
                  const total = context.dataset.data.reduce((a, b) => a + b, 0);
                  const percentage = ((context.raw / total) * 100).toFixed(1);
                  return context.label + ': ' + context.raw.toFixed(2) + '万 (' + percentage + '%)';
                }
              }
            }
          }
        }
      });

      const ctx3 = document.getElementById('barChart').getContext('2d');
      if (barChart) barChart.destroy();
      barChart = new Chart(ctx3, {
        type: 'bar',
        data: {
          labels: allScenarios.map((s, i) => s.name),
          datasets: [{
            label: '总存款（万元）',
            data: allScenarios.map(s => (s.result.investmentPortfolio || s.result.totalSavings) / 10000),
            backgroundColor: getChartColors(allScenarios.length),
            borderWidth: 0,
            borderRadius: 10
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            tooltip: {
              callbacks: {
                label: function(context) {
                  return context.dataset.label + ': ' + context.raw.toFixed(2) + ' 万';
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                callback: function(value) {
                  return value.toFixed(0) + '万';
                }
              }
            }
          }
        }
      });

      const ctx4 = document.getElementById('areaChart').getContext('2d');
      if (areaChart) areaChart.destroy();
      areaChart = new Chart(ctx4, {
        type: 'line',
        data: {
          labels: data.map(d => `${d.age}岁`),
          datasets: [
            {
              label: '累计存款（万元）',
              data: data.map(d => d.totalSavings / 10000),
              borderColor: '#667eea',
              backgroundColor: 'rgba(102, 126, 234, 0.5)',
              fill: true,
              tension: 0.4
            },
            {
              label: '投资收益（万元）',
              data: data.map(d => d.investmentIncome / 10000),
              borderColor: '#48bb78',
              backgroundColor: 'rgba(72, 187, 120, 0.5)',
              fill: true,
              tension: 0.4
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            tooltip: {
              callbacks: {
                label: function(context) {
                  return context.dataset.label + ': ' + context.raw.toFixed(2) + ' 万';
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              stacked: true,
              ticks: {
                callback: function(value) {
                  return value.toFixed(0) + '万';
                }
              }
            }
          }
        }
      });
    }

    function renderTable(data) {
      let tableHtml = `
        <table>
          <thead>
            <tr>
              <th>年龄</th>
              <th>年薪（万元）</th>
              <th>年存款（万元）</th>
              <th>累计存款（万元）</th>
              <th>投资组合（万元）</th>
              <th>投资收益（万元）</th>
            </tr>
          </thead>
          <tbody>
      `;

      data.forEach(d => {
        tableHtml += `
          <tr>
            <td>${d.age}岁</td>
            <td>${formatNumber(d.salary)}</td>
            <td>${formatNumber(d.savings)}</td>
            <td>${formatNumber(d.totalSavings)}</td>
            <td><strong>${formatNumber(d.investmentPortfolio)}</strong></td>
            <td style="color: #48bb78;">+${formatNumber(d.investmentIncome)}</td>
          </tr>
        `;
      });

      tableHtml += '</tbody></table>';
      return tableHtml;
    }

    function renderScenarioTabs() {
      const tabsContainer = document.getElementById('scenarioTabs');
      tabsContainer.innerHTML = scenarios.map((s, i) => `
        <button class="scenario-tab ${i === 0 ? 'active' : ''}" onclick="showScenario(${i})">
          ${s.name}
        </button>
      `).join('');
    }

    function showScenario(index) {
      document.querySelectorAll('.scenario-tab').forEach((tab, i) => {
        tab.classList.toggle('active', i === index);
      });

      const s = scenarios[index];
      document.getElementById('scenarioContent').innerHTML = `
        <h3 style="margin: 20px 0 10px; color: #555;">${s.name} - 详细数据</h3>
        ${renderTable(s.result.data)}
      `;
      
      renderCharts(s.result.data, scenarios);
    }

    function applyPreset(type) {
      const preset = presets[type];
      document.getElementById('growthRate').value = preset.growthRate;
      document.getElementById('saveRate').value = preset.saveRate;
      document.getElementById('investmentRate').value = preset.investmentRate;
      document.getElementById('inflationRate').value = preset.inflationRate;
      
      document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
    }

    function calculateAndShow() {
      const age = parseInt(document.getElementById('currentAge').value);
      const salaryWan = parseFloat(document.getElementById('currentSalary').value);
      const salary = salaryWan * 10000;
      const growthRate = parseFloat(document.getElementById('growthRate').value);
      const saveRate = parseFloat(document.getElementById('saveRate').value);
      const investmentRate = parseFloat(document.getElementById('investmentRate').value);
      const inflationRate = parseFloat(document.getElementById('inflationRate').value);
      const enableInvestment = document.getElementById('enableInvestment').checked;
      const enableInflation = document.getElementById('enableInflation').checked;

      if (isNaN(age) || isNaN(salary) || isNaN(growthRate) || isNaN(saveRate)) {
        showError('请填写所有必填项！');
        return;
      }

      if (age < 18 || age > 35) {
        showError('年龄必须在18-35岁之间！');
        return;
      }

      if (salary < 0 || growthRate < 0 || saveRate < 0 || saveRate > 100) {
        showError('请输入有效的数值！');
        return;
      }

      const result = calculateSavings(age, salary, growthRate, saveRate, investmentRate, inflationRate, enableInvestment, enableInflation);
      if (!result) return;

      const scenarioName = `场景1（当前）`;
      scenarios = [{
        name: scenarioName,
        params: { age, salary: salaryWan, growthRate, saveRate, investmentRate, inflationRate },
        result: result
      }];

      document.getElementById('resultsCard').style.display = 'block';
      document.getElementById('totalSavings').textContent = formatWan(result.totalSavings);
      document.getElementById('realTotalSavings').textContent = formatWan(result.realTotalSavings);
      document.getElementById('investmentIncome').textContent = formatWan(result.investmentIncome);
      document.getElementById('avgSalary').textContent = formatWan(result.avgSalary);
      document.getElementById('avgSavings').textContent = formatWan(result.avgSavings);
      document.getElementById('workYears').textContent = result.workYears;

      renderScenarioTabs();
      showScenario(0);
      loadHistory();
    }

    function addScenario() {
      const age = parseInt(document.getElementById('currentAge').value);
      const salaryWan = parseFloat(document.getElementById('currentSalary').value);
      const salary = salaryWan * 10000;
      const growthRate = parseFloat(document.getElementById('growthRate').value);
      const saveRate = parseFloat(document.getElementById('saveRate').value);
      const investmentRate = parseFloat(document.getElementById('investmentRate').value);
      const inflationRate = parseFloat(document.getElementById('inflationRate').value);
      const enableInvestment = document.getElementById('enableInvestment').checked;
      const enableInflation = document.getElementById('enableInflation').checked;

      const scenarioNum = scenarios.length + 1;
      const newGrowth = Math.min(growthRate + 5, 30);
      const newSave = Math.max(saveRate - 10, 10);

      const result = calculateSavings(age, salary, newGrowth, newSave, investmentRate, inflationRate, enableInvestment, enableInflation);
      if (!result) return;

      scenarios.push({
        name: `场景${scenarioNum}（增长率${newGrowth}%，存款${newSave}%）`,
        params: { age, salary: salaryWan, growthRate: newGrowth, saveRate: newSave, investmentRate, inflationRate },
        result: result
      });

      renderScenarioTabs();
      showScenario(scenarios.length - 1);
    }

    function exportData() {
      if (scenarios.length === 0) {
        showError('请先计算数据！');
        return;
      }

      let csvContent = '\uFEFF';
      scenarios.forEach((s, i) => {
        csvContent += `${s.name}\n`;
        csvContent += '年龄,年薪（万元）,年存款（万元）,累计存款（万元）,投资组合（万元）,投资收益（万元）\n';
        s.result.data.forEach(d => {
          csvContent += `${d.age},${(d.salary/10000).toFixed(2)},${(d.savings/10000).toFixed(2)},${(d.totalSavings/10000).toFixed(2)},${(d.investmentPortfolio/10000).toFixed(2)},${(d.investmentIncome/10000).toFixed(2)}\n`;
        });
        csvContent += `\n总存款,${(s.result.totalSavings/10000).toFixed(2)},,总投资收益,${(s.result.investmentIncome/10000).toFixed(2)},实际价值,${(s.result.realTotalSavings/10000).toFixed(2)}\n\n`;
      });

      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `工资计算_${new Date().toLocaleDateString('zh-CN')}.csv`;
      link.click();
    }

    function saveToHistory() {
      if (scenarios.length === 0) {
        showError('请先计算数据！');
        return;
      }

      let history = JSON.parse(localStorage.getItem('calculatorHistory') || '[]');
      const current = {
        id: Date.now(),
        date: new Date().toLocaleString('zh-CN'),
        params: scenarios[0].params,
        totalSavings: scenarios[0].result.totalSavings
      };
      
      history.unshift(current);
      if (history.length > 10) history.pop();
      
      localStorage.setItem('calculatorHistory', JSON.stringify(history));
      loadHistory();
      alert('已保存到历史记录！');
    }

    function loadHistory() {
      const history = JSON.parse(localStorage.getItem('calculatorHistory') || '[]');
      const historyCard = document.getElementById('historyCard');
      const historyList = document.getElementById('historyList');

      if (history.length === 0) {
        historyCard.style.display = 'none';
        return;
      }

      historyCard.style.display = 'block';
      historyList.innerHTML = history.map(item => `
        <div class="history-item">
          <div class="history-info">
            <strong>${item.date}</strong> - 年龄:${item.params.age}岁 年薪:${item.params.salary}万 增长率:${item.params.growthRate}% 
            → 总存款: <strong>${formatWan(item.totalSavings)}万</strong>
          </div>
          <div class="history-actions">
            <button class="history-btn load" onclick="loadFromHistory(${item.id})">加载</button>
            <button class="history-btn delete" onclick="deleteFromHistory(${item.id})">删除</button>
          </div>
        </div>
      `).join('');
    }

    function loadFromHistory(id) {
      const history = JSON.parse(localStorage.getItem('calculatorHistory') || '[]');
      const item = history.find(h => h.id === id);
      if (!item) return;

      document.getElementById('currentAge').value = item.params.age;
      document.getElementById('currentSalary').value = item.params.salary;
      document.getElementById('growthRate').value = item.params.growthRate;
      document.getElementById('saveRate').value = item.params.saveRate;
      if (item.params.investmentRate !== undefined) {
        document.getElementById('investmentRate').value = item.params.investmentRate;
      }
      if (item.params.inflationRate !== undefined) {
        document.getElementById('inflationRate').value = item.params.inflationRate;
      }
      
      document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
      calculateAndShow();
    }

    function deleteFromHistory(id) {
      let history = JSON.parse(localStorage.getItem('calculatorHistory') || '[]');
      history = history.filter(h => h.id !== id);
      localStorage.setItem('calculatorHistory', JSON.stringify(history));
      loadHistory();
    }

    function resetForm() {
      document.getElementById('currentAge').value = 28;
      document.getElementById('currentSalary').value = 30;
      document.getElementById('growthRate').value = 10;
      document.getElementById('saveRate').value = 40;
      document.getElementById('investmentRate').value = 6;
      document.getElementById('inflationRate').value = 3;
      document.getElementById('enableInflation').checked = true;
      document.getElementById('enableInvestment').checked = true;
      document.getElementById('resultsCard').style.display = 'none';
      document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
      scenarios = [];
      if (salaryChart) { salaryChart.destroy(); salaryChart = null; }
      if (pieChart) { pieChart.destroy(); pieChart = null; }
      if (barChart) { barChart.destroy(); barChart = null; }
      if (areaChart) { areaChart.destroy(); areaChart = null; }
    }

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('currentAge').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          calculateAndShow();
        }
      });
      loadHistory();
    });
  </script>
</body>
</html>
